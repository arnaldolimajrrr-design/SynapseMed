name: Build Android APK from Drive ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_ZIP_FILEID: '1k1Q2cDx2biokwKzMg_Xq4kLRkUupQ4GU'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y unzip curl

      - name: Download and Unzip project
        run: |
          curl -L "https://drive.google.com/uc?export=download&id=${{ env.PROJECT_ZIP_FILEID }}" -o project.zip
          mkdir -p project_source
          unzip -q project.zip -d project_source
          # Lista o conteúdo para sabermos onde o projeto está
          echo "Conteúdo extraído:"
          find project_source -maxdepth 3
          # Define o caminho base
          echo "PROJECT_ROOT=$(find project_source -name 'pubspec.yaml' -exec dirname {} \; | head -n 1)" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'

      - name: Build APK
        working-directory: ${{ env.PROJECT_ROOT }}
        run: |
          echo "Diretório atual: $(pwd)"
          ls -la
          # Tenta encontrar o gradlew e dar permissão
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            cd android && ./gradlew assembleDebug
          else
            chmod +x gradlew
            flutter build apk --debug --no-tree-shake-icons
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: '**/build/**/outputs/flutter-apk/*.apk'
