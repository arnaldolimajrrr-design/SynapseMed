name: Build Android APK from Drive ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_ZIP_FILEID: '1k1Q2cDx2biokwKzMg_Xq4kLRkUupQ4GU'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install unzip and curl
        run: sudo apt-get update && sudo apt-get install -y unzip curl rsync

      - name: Download and Unzip project
        run: |
          curl -c /tmp/gdcookies "https://drive.google.com/uc?export=download&id=${{ env.PROJECT_ZIP_FILEID }}" -s -o /tmp/gdpage.html
          CONFIRM=$(grep -o 'confirm=[^&"]*' /tmp/gdpage.html | sed 's/confirm=//' | head -n 1 || true)
          URL="https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${{ env.PROJECT_ZIP_FILEID }}"
          [ -z "$CONFIRM" ] && URL="https://drive.google.com/uc?export=download&id=${{ env.PROJECT_ZIP_FILEID }}"
          curl -L -b /tmp/gdcookies "$URL" -o project.zip
          mkdir -p project_source
          unzip -q project.zip -d project_source
          PROJECT_ROOT=$(find project_source -maxdepth 2 -name "pubspec.yaml" -exec dirname {} \;)
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'

      - name: Build APK
        working-directory: ${{ env.PROJECT_ROOT }}
        run: |
          chmod +x gradlew
          yes | flutter doctor --android-licenses
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ env.PROJECT_ROOT }}/build/app/outputs/flutter-apk/*.apk
