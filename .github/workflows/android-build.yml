name: Build Android APK from Drive ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_ZIP_FILEID: '1k1Q2cDx2biokwKzMg_Xq4kLRkUupQ4GU'

    steps:
     name: Checkout repository
  uses: actions/checkout@v4
  
    steps:
   - name: Checkout repository
    uses: actions/checkout@v4

   - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'
    
    - name: Verify Java
  run: java -version

     - name: Export Android SDK env and update PATH
  run: |
    echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
    echo "PATH=/usr/local/lib/android/sdk/cmdline-tools/latest/bin:/usr/local/lib/android/sdk/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Verify sdkmanager + accept licenses
  run: |
    sdkmanager --version
    yes | sdkmanager --licenses
      - name: Checkout (creates initial repo files)
        uses: actions/checkout@v4

      - name: Install unzip, curl and rsync
        run: sudo apt-get update && sudo apt-get install -y unzip curl rsync

      - name: Download project ZIP from Google Drive
        shell: bash
        run: |
          FILEID="${PROJECT_ZIP_FILEID}"
          echo "Downloading project zip from Drive (file id: $FILEID)"
          curl -c /tmp/gdcookies "https://drive.google.com/uc?export=download&id=${FILEID}" -s -o /tmp/gdpage.html
          CONFIRM=$(grep -o 'confirm=[^&"]*' /tmp/gdpage.html | sed 's/confirm=//' | head -n 1 || true)
          if [ -n "$CONFIRM" ]; then
            curl -L -b /tmp/gdcookies "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILEID}" -o project.zip
          else
            curl -L -o project.zip "https://drive.google.com/uc?export=download&id=${FILEID}"
          fi
          ls -lh project.zip || true

      - name: Unzip project and copy into workspace
        shell: bash
        run: |
          unzip -q project.zip -d project || true
          if [ -d project ]; then
            first=$(find project -maxdepth 1 -mindepth 1 -type d | head -n 1)
            if [ -n "$first" ]; then
              rsync -a "$first"/ "$GITHUB_WORKSPACE"/
            else
              rsync -a project/ "$GITHUB_WORKSPACE"/
            fi
          fi
          ls -la "$GITHUB_WORKSPACE"

      - name: Verify project root
        shell: bash
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Listing root files:"
          ls -la "$GITHUB_WORKSPACE"
          if [ -f "$GITHUB_WORKSPACE/pubspec.yaml" ]; then
            echo "Found pubspec.yaml at project root"
          else
            echo "ERROR: pubspec.yaml not found at project root. Searching for it..."
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f -name pubspec.yaml -print || true
            echo "If your project is nested, adjust the unzip/rsync logic to copy the correct subfolder into \$GITHUB_WORKSPACE"
            exit 1
          fi

      - name: Setup Java (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'

      - name: Accept Android licenses
        run: yes | $FLUTTER_ROOT/bin/flutter doctor --android-licenses || true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Debug - list apk files
        run: |
          echo "Listing APK output folders"
          ls -la build/app/outputs/flutter-apk || true
          ls -la build/app/outputs || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/**/*.apk
