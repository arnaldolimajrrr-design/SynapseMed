name: Build Android APK from Drive ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PROJECT_ZIP_FILEID: 1k1Q2cDx2biokwKzMg_Xq4kLRkUupQ4GU

    steps:
      - name: Checkout (creates initial repo files)
        uses: actions/checkout@v4

      - name: Install unzip and curl
        run: sudo apt-get update && sudo apt-get install -y unzip curl

      - name: Download project ZIP from Google Drive
        run: |
          echo "Downloading project zip from Drive (file id: $PROJECT_ZIP_FILEID)"
          curl -L -o project.zip "https://drive.google.com/uc?export=download&id=${PROJECT_ZIP_FILEID}"

      - name: Unzip project and copy into workspace
        run: |
          unzip -q project.zip -d project
          if [ -d project ]; then
            first=$(find project -maxdepth 1 -mindepth 1 -type d | head -n 1)
            if [ -n "$first" ]; then
              rsync -a "$first"/ $GITHUB_WORKSPACE/
            else
              rsync -a project/ $GITHUB_WORKSPACE/
            fi
          fi
          ls -la $GITHUB_WORKSPACE

      - name: Setup Java (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Accept Android licenses
        run: yes | $FLUTTER_ROOT/bin/flutter doctor --android-licenses || true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
